name: Atualizar previsão de chegada dos navios

on:
  schedule:
    - cron: '0 * * * *'   # roda a cada 1 hora, sozinho
  workflow_dispatch:        # permite rodar manualmente clicando num botão

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml playwright
      - run: playwright install --with-deps chromium
      - run: python scraper_zp21.py navios.txt
      - run: python scraper_psf.py navios_psf.txt
      - run: git add resultado_zp21.json resultado_psf.json
      - run: |
          git config user.name "Automação Painel"
          git config user.email "automacao@painel.local"
          git add resultado_zp21.json
          git commit -m "Atualização automática" || echo "Nada novo"
          git push
